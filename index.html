<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ohbitdesign</title>
<link rel="icon" type="image/x-icon" href="ohbitdesign.ico">
<link rel="icon" type="image/png" href="ohbitdesign_32.png" sizes="32x32">
<link rel="apple-touch-icon" href="ohbitdesign_192.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #08090F;
      color: #C8CFDF;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .logo span { color: #5B9CF6; }

    p {
      font-size: 0.85rem;
      color: #555E7A;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="logo">oh<span>bit</span>design</div>
  <p>COMING SOON</p>
</body>
</html>
